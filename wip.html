<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <title>Coming Soon — Babylon</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #080808;
      --surface:       #101010;
      --border:        rgba(255,255,255,0.07);
      --text-primary:  #FFFFFF;
      --text-secondary:#A3A3A3;
      --text-muted:    #525252;
      --accent:        #7B2FBE;
      --accent-hover:  #9D4EDD;
      --gain:          #10B981;
      --font-sans:     'Inter', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono', monospace;
      --ease:          cubic-bezier(0.16,1,0.3,1);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
    html { scroll-behavior:smooth }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    a { text-decoration: none; color: inherit; cursor: pointer }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(123,47,190,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 64px;
    }

    .card {
      position: relative;
      max-width: 460px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
    }

    @media(max-width:480px) {
      .card { padding: 36px 24px }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--gain);
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.18);
      border-radius: 9999px;
      padding: 4px 12px;
      margin-bottom: 28px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gain);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1 }
      50%      { opacity:0.3 }
    }

    h1 {
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 360px;
      margin: 0 auto 36px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 20px;
      transition: color 200ms var(--ease), border-color 200ms var(--ease);
    }

    .back-link:hover {
      color: var(--text-secondary);
      border-color: rgba(255,255,255,0.14);
    }

    .footer-note {
      margin-top: 40px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-note a {
      color: rgba(123,47,190,0.8);
      transition: color 200ms;
    }

    .footer-note a:hover { color: var(--accent-hover) }
  </style>
</head>
<body>

  <span class="wordmark">Babylon</span>

  <div class="card">
    <div class="badge">In development</div>

    <h1>We're still<br />building this.</h1>

    <p>The Babylon app is in private testing. We're making sure everything works before opening the doors.</p>

    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to bebabylon.com
    </a>
  </div>

  <p class="footer-note">Already have access? <a href="https://app.bebabylon.com">Go directly to the app →</a></p>

</body>
</html>
