<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" fill="none">
  <rect width="600" height="240" rx="12" fill="#0D0D28"/>

  <!-- LEFT PANEL: 2015 -->
  <text x="148" y="26" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#10B981" letter-spacing="2">2015</text>

  <!-- Cart body -->
  <rect x="78" y="82" width="104" height="60" rx="3" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <polyline points="62,82 68,60 78,60" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="96" cy="152" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>
  <circle cx="162" cy="152" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>

  <!-- Full cart items -->
  <rect x="82" y="60" width="22" height="24" rx="3" fill="#10B981" opacity="0.85"/>
  <rect x="108" y="54" width="20" height="30" rx="3" fill="#9D4EDD" opacity="0.85"/>
  <rect x="132" y="62" width="18" height="22" rx="3" fill="#F59E0B" opacity="0.85"/>
  <rect x="94" y="44" width="24" height="18" rx="3" fill="#F472B6" opacity="0.75"/>
  <rect x="122" y="50" width="16" height="12" rx="3" fill="#38BDF8" opacity="0.75"/>

  <!-- £60 badge -->
  <rect x="102" y="172" width="56" height="28" rx="7" fill="#10B981"/>
  <text x="130" y="191" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="white">£60</text>

  <!-- Happy smiley -->
  <circle cx="148" cy="218" r="13" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="143" cy="215" r="1.8" fill="rgba(255,255,255,0.55)"/>
  <circle cx="153" cy="215" r="1.8" fill="rgba(255,255,255,0.55)"/>
  <path d="M143 220 Q148 225 153 220" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- DIVIDER -->
  <line x1="300" y1="18" x2="300" y2="226" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- RIGHT PANEL: TODAY -->
  <text x="394" y="26" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#F43F5E" letter-spacing="2">TODAY</text>

  <!-- Same cart, fewer items -->
  <rect x="318" y="82" width="104" height="60" rx="3" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <polyline points="302,82 308,60 318,60" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="336" cy="152" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>
  <circle cx="402" cy="152" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>

  <!-- Sparse items -->
  <rect x="330" y="74" width="20" height="22" rx="3" fill="#10B981" opacity="0.4"/>
  <rect x="356" y="70" width="18" height="26" rx="3" fill="#9D4EDD" opacity="0.4"/>

  <!-- £85 badge -->
  <rect x="342" y="172" width="56" height="28" rx="7" fill="#F43F5E"/>
  <text x="370" y="191" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="white">£85</text>

  <!-- Surprised smiley -->
  <circle cx="388" cy="218" r="13" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="383" cy="214" r="2" fill="rgba(255,255,255,0.55)"/>
  <circle cx="393" cy="214" r="2" fill="rgba(255,255,255,0.55)"/>
  <ellipse cx="388" cy="221" rx="3.5" ry="4" fill="rgba(255,255,255,0.3)"/>
  <path d="M380 210 Q383 207 386 209" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M390 209 Q393 207 396 210" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Monster peeking bottom-right -->
  <ellipse cx="534" cy="232" rx="32" ry="7" fill="rgba(0,0,0,0.25)"/>
  <ellipse cx="534" cy="198" rx="34" ry="28" fill="#F59E0B"/>
  <!-- Horns -->
  <polygon points="520,176 515,156 526,172" fill="#D97706"/>
  <polygon points="548,176 553,156 542,172" fill="#D97706"/>
  <!-- Eyes -->
  <circle cx="524" cy="192" r="6.5" fill="#1A1205"/>
  <circle cx="544" cy="192" r="6.5" fill="#1A1205"/>
  <circle cx="526" cy="190" r="2" fill="white"/>
  <circle cx="546" cy="190" r="2" fill="white"/>
  <!-- Grin -->
  <path d="M520 205 Q534 214 548 205" stroke="#92400E" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Coin in claw -->
  <circle cx="558" cy="222" rx="11" fill="#F59E0B" r="11" stroke="#D97706" stroke-width="1.5"/>
  <text x="558" y="226.5" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#451A00">£</text>
</svg>
