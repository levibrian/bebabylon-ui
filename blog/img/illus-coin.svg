<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="12" fill="#0D0D28"/>

  <!-- Coin shadow -->
  <ellipse cx="175" cy="206" rx="68" ry="10" fill="rgba(0,0,0,0.3)"/>

  <!-- Coin body with chunk missing (clip using path) -->
  <!-- Full circle: cx=175, cy=108, r=72 -->
  <!-- Missing chunk at ~1 o'clock (top-right) -->
  <path d="
    M 175 36
    A 72 72 0 1 0 237 68
    Z
  " fill="#F59E0B" opacity="0.18" stroke="#F59E0B" stroke-width="2.5"/>
  <path d="
    M 175 36
    A 72 72 0 1 0 237 68
    Z
  " fill="none" stroke="#F59E0B" stroke-width="2.5"/>

  <!-- £ symbol inside coin -->
  <text x="163" y="122" font-family="Inter,sans-serif" font-size="38" font-weight="700" fill="#F59E0B" opacity="0.6">£</text>

  <!-- Missing chunk label -->
  <line x1="234" y1="65" x2="290" y2="44" stroke="rgba(244,63,94,0.6)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="284" y="28" width="96" height="26" rx="6" fill="rgba(244,63,94,0.15)" stroke="rgba(244,63,94,0.4)" stroke-width="1"/>
  <text x="332" y="45" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#F43F5E">10p gone</text>

  <!-- Monster sitting on coin edge (top right) -->
  <ellipse cx="268" cy="82" rx="26" ry="20" fill="#F59E0B"/>
  <!-- Horns -->
  <polygon points="257,66 253,50 262,63" fill="#D97706"/>
  <polygon points="279,66 283,50 274,63" fill="#D97706"/>
  <!-- Eyes -->
  <circle cx="261" cy="77" r="5" fill="#1A1205"/>
  <circle cx="275" cy="77" r="5" fill="#1A1205"/>
  <circle cx="262.5" cy="75.5" r="1.5" fill="white"/>
  <circle cx="276.5" cy="75.5" r="1.5" fill="white"/>
  <!-- Mouth (eating/chewing) -->
  <path d="M258 86 Q268 93 278 86" stroke="#92400E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Small arm nibbling -->
  <path d="M258 80 Q248 72 238 68" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <path d="M258 80 Q248 72 238 68" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
</svg>
